<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>HERO sdlog viewer</title>
  <style>
    :root { color-scheme: light dark; }
    body { font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial; margin: 16px; }
    .row { display: flex; gap: 16px; align-items: flex-start; }
    .panel { border: 1px solid #6666; border-radius: 8px; padding: 12px; }
    .left { width: 420px; }
    .right { flex: 1; min-width: 520px; }
    select, input, button { font-size: 14px; padding: 6px; }
    canvas { width: 100%; height: 460px; border: 1px solid #6666; border-radius: 8px; }
    .muted { opacity: 0.75; font-size: 12px; }
    .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
    .sp { height: 8px; }
  </style>
</head>
<body>
  <h2 style="margin:0 0 12px 0;">HERO sdlog viewer</h2>
  <div class="muted mono" id="meta"></div>
  <div class="sp"></div>
  <div class="row">
    <div class="panel left">
      <div>
        <label>Tag</label><br/>
        <select id="tagSel" style="width:100%;"></select>
      </div>
      <div class="sp"></div>
      <div>
        <label>Field</label><br/>
        <select id="fieldSel" style="width:100%;"></select>
      </div>
      <div class="sp"></div>
      <div>
        <input id="fieldFilter" placeholder="filter field..." style="width:100%;" />
      </div>
      <div class="sp"></div>
      <div>
        <label>Plot max points</label><br/>
        <input id="maxPoints" type="number" value="5000" min="200" step="100" style="width:160px;" />
        <button id="plotBtn">Plot</button>
      </div>
      <div class="sp"></div>
      <div>
        <button id="csvTagBtn">Export tag CSV</button>
        <button id="csvFieldBtn">Export field CSV</button>
      </div>
      <div class="sp"></div>
      <div class="muted" id="hint"></div>
    </div>
    <div class="panel right">
      <canvas id="plot" width="1200" height="480"></canvas>
      <div class="muted mono" id="stat" style="margin-top:8px;"></div>
    </div>
  </div>

  <script>
  const $ = (id) => document.getElementById(id);
  let indexData = null;

  function fmt(n) { return (typeof n === 'number') ? n.toString() : String(n); }

  function drawPlot(canvas, t, y) {
    const ctx = canvas.getContext('2d');
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = getComputedStyle(document.body).getPropertyValue('color');

    if (!t || !y || t.length === 0 || y.length === 0) {
      ctx.fillText('No data', 12, 24);
      return;
    }

    let xmin = t[0], xmax = t[t.length - 1];
    let ymin = Infinity, ymax = -Infinity;
    for (let i = 0; i < y.length; i++) {
      const v = y[i];
      if (v === null || v === undefined || Number.isNaN(v)) continue;
      if (v < ymin) ymin = v;
      if (v > ymax) ymax = v;
    }
    if (!Number.isFinite(ymin) || !Number.isFinite(ymax)) {
      ctx.fillText('No numeric data', 12, 24);
      return;
    }
    if (ymin === ymax) { ymin -= 1; ymax += 1; }

    const padL = 56, padR = 14, padT = 14, padB = 36;
    const w = canvas.width - padL - padR;
    const h = canvas.height - padT - padB;

    const x2px = (x) => padL + (x - xmin) * w / (xmax - xmin);
    const y2px = (v) => padT + (ymax - v) * h / (ymax - ymin);

    ctx.strokeStyle = '#8888';
    ctx.beginPath();
    ctx.moveTo(padL, padT);
    ctx.lineTo(padL, padT + h);
    ctx.lineTo(padL + w, padT + h);
    ctx.stroke();

    ctx.fillStyle = '#888c';
    ctx.font = '12px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace';
    ctx.fillText(`t: ${fmt(xmin)}..${fmt(xmax)} ms`, padL, canvas.height - 12);
    ctx.save();
    ctx.translate(14, padT + 12);
    ctx.rotate(-Math.PI / 2);
    ctx.fillText(`y: ${ymin.toFixed(3)}..${ymax.toFixed(3)}`, 0, 0);
    ctx.restore();

    ctx.strokeStyle = '#3b82f6';
    ctx.lineWidth = 1.0;
    ctx.beginPath();
    let started = false;
    for (let i = 0; i < t.length; i++) {
      const v = y[i];
      if (v === null || v === undefined || Number.isNaN(v)) continue;
      const px = x2px(t[i]);
      const py = y2px(v);
      if (!started) { ctx.moveTo(px, py); started = true; }
      else { ctx.lineTo(px, py); }
    }
    ctx.stroke();
  }

  async function loadIndex() {
    const r = await fetch('/api/index');
    indexData = await r.json();
    $('meta').textContent = `file=${indexData.source_path}  version=${indexData.file_version}  boot_tick_ms=${indexData.boot_tick_ms}`;

    const tagSel = $('tagSel');
    tagSel.innerHTML = '';
    for (const t of indexData.tags) {
      const opt = document.createElement('option');
      opt.value = t.key;
      opt.textContent = `${t.name} (${t.count})`;
      tagSel.appendChild(opt);
    }
    tagSel.onchange = () => fillFields();
    fillFields();
  }

  function fillFields() {
    const key = $('tagSel').value;
    const t = indexData.tags.find(x => x.key === key);
    const fieldSel = $('fieldSel');
    fieldSel.innerHTML = '';
    if (!t) return;
    const q = ($('fieldFilter').value || '').toLowerCase();
    for (const f of t.fields) {
      if (q && !f.toLowerCase().includes(q)) continue;
      const opt = document.createElement('option');
      opt.value = f;
      opt.textContent = f;
      fieldSel.appendChild(opt);
    }
    $('hint').textContent = t.fields.length ? '' : 'This tag has no decoded fields (skipped/unknown).';
  }

  async function doPlot() {
    const key = $('tagSel').value;
    const field = $('fieldSel').value;
    const maxPoints = parseInt($('maxPoints').value || '5000', 10);
    if (!key || !field) return;
    $('stat').textContent = 'loading...';
    const qs = new URLSearchParams({key, field, max_points: String(maxPoints)});
    const r = await fetch('/api/series?' + qs.toString());
    if (!r.ok) {
      $('stat').textContent = `error ${r.status}`;
      return;
    }
    const data = await r.json();
    drawPlot($('plot'), data.t_ms, data.y);
    $('stat').textContent = `${key}  ${field}  points=${data.t_ms.length}`;
  }

  function download(url) {
    const a = document.createElement('a');
    a.href = url;
    a.download = '';
    document.body.appendChild(a);
    a.click();
    a.remove();
  }

  function exportTagCsv() {
    const key = $('tagSel').value;
    if (!key) return;
    download('/api/export.csv?key=' + encodeURIComponent(key));
  }

  function exportFieldCsv() {
    const key = $('tagSel').value;
    const field = $('fieldSel').value;
    if (!key || !field) return;
    const qs = new URLSearchParams({key, field});
    download('/api/export_field.csv?' + qs.toString());
  }

  $('plotBtn').onclick = doPlot;
  $('csvTagBtn').onclick = exportTagCsv;
  $('csvFieldBtn').onclick = exportFieldCsv;
  $('fieldFilter').oninput = fillFields;

  loadIndex().then(() => doPlot());
  </script>
</body>
</html>
